# ── Terminal ───────────────────────────────────────────────────
set -g  default-terminal   "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -g  focus-events       on

# ── General ────────────────────────────────────────────────────
set -g  prefix             C-Space
bind    C-Space            send-prefix
set -g  mouse              on
set -g  base-index         1
set -g  pane-base-index    1
set -g  renumber-windows   on
set -g  automatic-rename   on
set -g  history-limit      50000
set -g  display-time       3000
set -g  escape-time        0
set -g  set-clipboard      on

# ── Status bar ─────────────────────────────────────────────────
set -g  status             on
set -g  status-interval    2
set -g  status-position    bottom
set -g  monitor-activity   on
set -g  visual-activity    off
set -g  clock-mode-style   24

# ── Keybindings ────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"

# Splits preserve cwd
bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window jump — Option+1..5 (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Copy mode — vi
set -g mode-keys vi
bind -T copy-mode-vi v                  send-keys -X begin-selection
bind -T copy-mode-vi y                  send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel "pbcopy"

# Layouts
bind b   set-option -g status
bind D   run-shell "~/.tmux/layouts/dev.sh"  \; display-message "  Dev layout"
bind @   run-shell "~/.tmux/layouts/2col.sh" \; display-message "  2 columns"
bind '#' run-shell "~/.tmux/layouts/3col.sh" \; display-message "  3 columns"

# Lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -S "fg=#262626" -s "bg=#101010" -E "lazygit"

# Sesh — requires sesh + fzf
bind s run-shell "sesh connect \"$(sesh list -t | fzf-tmux -p 55%,60% --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' --color='bg+:#1a1a1a,bg:#101010,spinner:#ff8080,hl:#ff8080,fg:#ffffff,header:#808080,info:#b3a3ff,pointer:#ff8080,marker:#ff8080,fg+:#ffffff,prompt:#ff8080,hl+:#ff8080,border:#262626,label:#808080,query:#ffffff')\""

# ── Plugins (TPM) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore               'on'
set -g @continuum-save-interval         '10'

set -g @tmux-fzf-launch-key 'F'
TMUX_FZF_PREVIEW=1

set -g @thumbs-key      Space
set -g @thumbs-alphabet colemak-homerow
set -g @thumbs-command  'echo -n {} | pbcopy'

run '~/.tmux/plugins/tpm/tpm'

# ── Vesper theme (overrides — must run after TPM) ──────────────
set -g status-style                "bg=default,fg=#ffffff"
set -g status-left-style           "bg=default,fg=#ffffff"
set -g status-right-style          "bg=default,fg=#ffffff"
set -g window-status-style         "bg=default,fg=#4e4e4e"
set -g window-status-current-style "bg=default,fg=#ffffff,bold"
set -g window-status-activity-style "bg=default,fg=#ffffff"
set -g message-style               "bg=#101010,fg=#ffffff"
set -g message-command-style       "bg=#101010,fg=#ffffff"

set -g pane-border-style        fg="#1e1e1e"
set -g pane-active-border-style fg="#ff8080"

set -g window-status-format          "#I #W"
set -g window-status-current-format  "#[fg=#ffffff,bold]#I #W"
set -g window-status-separator       "   "

set -g status-left-length  50
set -g status-right-length 250
set -g status-interval     5

set -g status-left "#{?client_prefix,#[fg=#ff8080]#[bold]● #S   ,#[fg=#808080]○ #S   }"

set -g status-right "#(/Users/maciek/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#(~/.tmux/scripts/dir-git-status.sh '#{pane_current_path}')#[fg=#ffffff]claude #[fg=#ff8080]#(~/.tmux/scripts/claude-usage.sh)   #[fg=#4e4e4e]bat #[fg=#ffffff]#(/Users/maciek/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)   #[fg=#4e4e4e]cpu #[fg=#ffffff]#(/Users/maciek/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)   #[fg=#4e4e4e]ram #[fg=#ffffff]#(/Users/maciek/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)   #[fg=#4e4e4e]%Y-%m-%d  #[fg=#ffffff]%H:%M:%S"
